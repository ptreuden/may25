<!DOCTYPE html>
<html lang="en" dir="ltr">
  <head>
    <meta charset="utf-8">
    <title>May 25th Review</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" type="text/css" stupid="yes" href="may25.css">
  </head>
  <body>
    <h1>May 25th Review</h1>
    <div class="main">
      <div class="top">
        <h3>Add a nickname:</h3>
      </div>
      <div class="bottom">
        <div class="form-div">
          <input id="input" type="text" name="nickname" value="">
          <button id="addButton" type="button" name="button">Add</button>
        </div>
      </div>
    </div>
    <div class="list-container">
      <ul class="list-div">
        <div id="list-item-container" class="list-item-container">
          <li class="list-item">
            <button id="xButton" class="xButton" type="button" name="xbutton">X</button>
            <p>Item 1</p>
          </li>
        </div>
      </ul>

    </div>

    <script type="text/javascript" src="may25.js"></script>
  </body>
</html>
